<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <title>windbnb</title>
    <link rel="stylesheet" href="./src/style.css" />
    <script type="module" src="./src/scripts/main.js"></script>
  </head>
  <body class="flex flex-col w-full items-center font-poppins">
    <!-- Deployable Search Menu -->
    <div id="search" class="opacity-0 invisible fixed z-100 bg-[#00000081] w-full h-full">
      <!-- Menu Body -->
      <aside id="searchBody"
        class="overflow-hidden max-h-0 relative flex flex-col items-center gap-2 w-full h-120 bg-white transition-all duration-500 ease-in-out"
      >
        <!-- Heading and Exit -->
        <div
          class="flex justify-between items-center w-full p-5 md:px-9 md:pt-7 lg:px-11 lg:pt-9"
        >
          <p class="font-semibold text-xs md:text-sm lg:text-base">
            Edit Your Search
          </p>
          <svg
            id="closeMenu"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="3"
            stroke="currentColor"
            class="size-6 hover:text-accRed hover:cursor-pointer"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 18 18 6M6 6l12 12"
            />
          </svg>
        </div>
        <!-- Search Bar -->
        <nav
          class="md:flex md:w-2xl lg:w-5xl shadow-[0_0_10px_#ddd] w-xs rounded-2xl"
        >
          <!-- Location Input -->
          <div
            id="locationBox"
            class="relative md:w-2/5 border-r border-gray-200"
          >
            <div class="py-2 px-6 rounded-2xl focus-within:inset-ring-1 focus-within:inset-ring-accRed">
              <label
                for="location"
                class="w-full text-xs font-semibold text-slate-700"
                >LOCATION</label
              >
              <input
                type="text"
                id="location"
                name="location"
                class="w-full focus:outline-none caret-accRed"
              />
            </div>
            <!-- Location Suggustion List -->
            <ul id="searchList" class="hidden absolute top-36 md:top-20">
              <li class="city flex gap-3 p-1 hover:cursor-pointer">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-6 text-accRed"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"
                  />
                </svg>
                <span class="text-gray-500 hover:text-accGray">Helsinki, Finland</span>
              </li>
              <li class="city flex gap-3 p-1 hover:cursor-pointer">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-6 text-accRed"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"
                  />
                </svg>
                <span class="text-gray-500 hover:text-accGray">Vaasa, Finland</span>
              </li>
              <li class="city flex gap-3 p-1 hover:cursor-pointer">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-6 text-accRed"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"
                  />
                </svg>
                <span class="text-gray-500 hover:text-accGray">Oulu, Finland</span>
              </li>
            </ul>
          </div>
          <!-- Guest Input -->
          <div id="guestSection" class="relative md:w-2/5 border-r border-gray-200">
            <div id="guestBox" class="py-2 px-6 rounded-2xl h-full hover:cursor-pointer">
              <p class="text-xs font-semibold text-slate-700">GUESTS</p>
              <p id="guestTotal">0 guests</p>
            </div>
            <!-- Adult Counter -->
            <div id="guestCounters" class="hidden absolute top-20">
              <div
                id="adultCount"
                class="self-start md:self-center pl-8 w-44"
              >
                <p class="font-bold">Adults</p>
                <p class="text-gray-400 font-light">Ages 13 or above</p>
                <div class="flex justify-between items-center pt-2">
                  <button
                    type="button"
                    data-action="subtract"
                    class="w-7 h-7 rounded-md bg-gray-200 border border-gray-500"
                  >
                    -
                  </button>
                  <p id="adultTotal">0</p>
                  <button
                    type="button"
                    data-action="add"
                    class="w-7 h-7 rounded-md bg-gray-200 border border-gray-500"
                  >
                    +
                  </button>
                </div>
              </div>
              <br>
              <!-- Children Counter -->
              <div
                id="childrenCount"
                class="self-start md:self-center pl-8 w-44"
              >
                <p class="font-bold">Children</p>
                <p class="text-gray-400 font-light">Ages 13 or below</p>
                <div class="flex justify-between items-center pt-2">
                  <button
                    type="button"
                    data-action="subtract"
                    class="w-7 h-7 rounded-md bg-gray-200 border border-gray-500"
                  >
                    -
                  </button>
                  <p id="childrenTotal">0</p>
                  <button
                    type="button"
                    data-action="add"
                    class="w-7 h-7 rounded-md bg-gray-200 border border-gray-500"
                  >
                    +
                  </button>
                </div>
              </div>
            </div>
          </div>
          <!-- Search (Close) Button Medium -->
          <div class="hidden md:flex justify-center items-center w-1/5 ">
            <button
              class="flex justify-center items-center gap-2 w-30 bg-accRed rounded-2xl text-white p-2 hover:bg-[#e22f2f] hover:cursor-pointer transition duration-200"
              id="searchButtonMed"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-4"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
                />
              </svg>
              search
            </button>
          </div>
        </nav>
        <!-- Search (Close) Button Mobile -->
        <button
          class="absolute bottom-4 md:hidden flex justify-center items-center gap-2 w-30 bg-accRed rounded-2xl text-white p-2 hover:bg-[#e22f2f] hover:cursor-pointer transition duration-200"
          id="searchButtonMob"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-4"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
            />
          </svg>
          search
        </button>
      </aside>
    </div>
    <!-- Logo and Search Menu Open -->
    <header
      class="flex flex-col w-full pt-4 pb-2 px-4 md:px-10 md:pt-8 lg:px-16 gap-8"
    >
      <div class="flex flex-col md:flex-row md:justify-between gap-6">
        <img
          src="./src/images/icons/logo-f7862584.svg"
          alt="windbnb Logo"
          class="w-30 p-2"
        />
        <!-- Search Open Button -->
        <button
          type="button"
          id="searchOpen"
          class="flex w-xs md:w-sm self-center shadow-[0_0_10px_#ddd] rounded-2xl text-gray-400 text-center hover:shadow-accRed transition duration-200 ease-in-out"
        >
          <p id="addLocation" class="border-r border-gray-200 p-4 w-3/7 hover:cursor-text">
            Add location
          </p>
          <p id="addGuests" class="border-r border-gray-200 p-4 w-3/7 hover:cursor-text">
            Add guests
          </p>
          <div class="flex justify-center items-center p-4 w-1/7 text-accRed hover:cursor-pointer">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-4"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
              />
            </svg>
          </div>
        </button>
      </div>

      <div class="flex justify-between flex-wrap gap-2 items-center text-accGray p-2">
        <h1 id="title" class="text-2xl md:text-3xl font-bold">
          Stays in <span id="titleCity">Finland</span><span id="titleGuests"></span>
        </h1>
        <p id="staysCount" class="text-lg">14 stays</p>
      </div>
    </header>
    <!-- List of Stays -->
    <main
      id="staysList"
      class="grid gap-6 md:gap-8 lg:gap-10 w-full max-w-7xl px-4 py-2 md:px-10 lg:px-16 md:grid-cols-2 lg:grid-cols-3 "
    ></main>
  </body>
</html>
